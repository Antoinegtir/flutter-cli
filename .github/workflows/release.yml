name: release

# Tag-driven releases. Push a `vX.Y.Z` tag — this workflow builds the
# `fl` binary on every supported target, packages a tarball + a sha256
# checksum, and attaches them to a GitHub Release. The release notes
# are autogenerated from the commit log since the previous tag.
#
# Typical usage:
#
#   1. bump Cargo.toml version in crates/flutter-cli/Cargo.toml
#   2. commit + push to main
#   3. git tag v0.2.0 && git push origin v0.2.0
#
# Homebrew tap users will be able to `brew upgrade fl` once the
# tap formula is wired to read the latest GitHub Release artifact.
on:
  push:
    tags:
      - "v*.*.*"
  # Manual trigger for re-running a release if anything in the artifact
  # path goes sideways. Pass the tag name in the input.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release, e.g. v0.2.0"
        required: true

env:
  CARGO_TERM_COLOR: always
  # Strip debug symbols + LTO for a smaller binary. Set per-job rather
  # than in Cargo.toml so dev builds stay fast.
  CARGO_PROFILE_RELEASE_LTO: thin
  CARGO_PROFILE_RELEASE_STRIP: symbols
  # actions/{checkout,upload-artifact,download-artifact}@v5 still ship
  # Node 20 in some tags; opt in to Node 24 now so we don't get the
  # deprecation warning on every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      # One failing target shouldn't tank the others — we still want
      # whichever binaries succeeded to land in the release.
      fail-fast: false
      matrix:
        include:
          # Apple Silicon Macs — the dominant Flutter-dev platform.
          - target: aarch64-apple-darwin
            runner: macos-14
          # Intel Macs — still common in older corp setups. Cross-compiled
          # from an Apple-Silicon runner because GitHub's macos-13 (Intel)
          # runners are being retired and queue times are unreliable.
          # rustc supports cross-target compilation between Apple targets
          # natively, no extra linker setup needed.
          - target: x86_64-apple-darwin
            runner: macos-14
          # x86_64 Linux — CI, dev VMs, GitHub Codespaces.
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # arm64 Linux — Raspberry Pi, Asahi, ARM cloud instances.
          # Built via the official GH ARM runner; falls back to cross
          # if that runner becomes flaky.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          # x86_64 Windows — MSVC toolchain. The `init` subcommand still
          # works (bash/zsh/fish shims are invoked from WSL / Git Bash),
          # and the TUI runs natively in Windows Terminal / ConPTY.
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            bin_ext: ".exe"
            archive_ext: "zip"
          # arm64 Windows — Surface / Snapdragon laptops.
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            bin_ext: ".exe"
            archive_ext: "zip"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup show
          rustup target add ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key per target so artifacts don't bleed
          # between e.g. arm64 and x86_64 builds.
          key: ${{ matrix.target }}

      - name: cargo build --release
        run: cargo build --release --locked --bin flutter-cli --target ${{ matrix.target }}

      - name: Package tarball + checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the version from the tag (vX.Y.Z → X.Y.Z) or from
          # the manual workflow_dispatch input.
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          version="${tag#v}"
          target="${{ matrix.target }}"
          bin_ext="${{ matrix.bin_ext }}"
          archive_ext="${{ matrix.archive_ext }}"
          [ -z "$archive_ext" ] && archive_ext="tar.gz"
          stage="flutter-cli-${version}-${target}"
          mkdir -p "dist/${stage}"
          cp "target/${target}/release/flutter-cli${bin_ext}" "dist/${stage}/"
          cp README.md "dist/${stage}/" 2>/dev/null || true
          cp LICENSE  "dist/${stage}/" 2>/dev/null || true
          if [ "$archive_ext" = "zip" ]; then
            # `7z` ships preinstalled on windows-latest runners and
            # produces a deterministic zip without a deflate fallback.
            (cd dist && 7z a -tzip "${stage}.zip" "${stage}" >/dev/null)
          else
            tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          fi
          archive="dist/${stage}.${archive_ext}"
          # `shasum` exists on macOS; `sha256sum` ships with coreutils on
          # Linux and inside Git Bash on Windows runners. Pick whichever
          # is on PATH so the same script works on all three.
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${stage}.${archive_ext}" > "${stage}.${archive_ext}.sha256")
          else
            (cd dist && shasum -a 256 "${stage}.${archive_ext}" > "${stage}.${archive_ext}.sha256")
          fi
          echo "tarball=${archive}"            >> "$GITHUB_OUTPUT"
          echo "checksum=${archive}.sha256"    >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flutter-cli-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # Permissions explicitly scoped so the auto-generated GITHUB_TOKEN
    # can write to Releases. Read access to contents is also needed to
    # generate the changelog from `git log`.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so `gh release create --generate-notes`
          # can compute the diff against the previous tag.
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p dist
          # `download-artifact` puts each artifact in its own folder;
          # we want every archive/checksum side-by-side for `gh release`.
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} dist/ \;
          ls -lh dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          # `--generate-notes` produces a markdown changelog from the
          # PRs / commits merged since the previous tag. `--clobber`
          # makes the workflow idempotent — re-running on the same tag
          # replaces the existing assets instead of erroring out.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" dist/* \
              --title "$tag" \
              --generate-notes \
              --verify-tag
          fi

  publish_npm:
    name: publish npm wrapper
    needs: release
    runs-on: ubuntu-latest
    # The `npm-publish` environment is registered on npmjs.com as a
    # Trusted Publisher (see Settings → Trusted Publisher on the
    # @antoinegtir/flutter-cli package). It scopes the OIDC token so
    # npm only accepts a publish from THIS workflow on THIS branch /
    # environment — no long-lived NPM_TOKEN needed.
    environment: npm-publish
    permissions:
      # `id-token: write` enables OIDC token minting for the
      # trusted-publisher exchange + the `--provenance` attestation.
      # `contents: read` is the default for actions/checkout.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync npm wrapper + binary version to the release tag
        # Strip the leading `v` so `v0.4.8` becomes `0.4.8`, then bump
        # BOTH `version` (the npm wrapper itself) AND `binaryVersion`
        # (the GitHub Release tag `install.js` downloads from). If
        # binaryVersion stays at an older value, `npm i -g` pulls a
        # newer wrapper that still installs stale binaries — silent
        # version drift in the user's PATH.
        working-directory: npm
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          version="${tag#v}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '$version';
            p.binaryVersion = '$version';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo 'After bump:'
          node -p "JSON.stringify({version: require('./package.json').version, binaryVersion: require('./package.json').binaryVersion}, null, 2)"

      - name: Publish to npm with provenance
        working-directory: npm
        run: npm publish --provenance --access public
